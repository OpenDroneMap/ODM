name: Build PRs

on:
  pull_request:
  workflow_dispatch:

jobs:
  pixi:
    strategy:
      matrix:
        platform:
          - ubuntu-latest
          - windows-2022
          - macos-latest
          - ubuntu-latest-arm64
    runs-on: ${{ matrix.platform }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Setup pixi
      uses: prefix-dev/setup-pixi@v0.9.3
      with:
        pixi-version: latest
    - name: Install environment
      run: pixi install --locked
    - name: Build SuperBuild
      run: pixi run build
    - name: Test
      run: pixi run test
    - name: Smoke
      run: pixi run smoke
    - name: Install prod environment
      run: pixi install --locked -e prod
    - name: Prod smoke
      run: pixi run -e prod smoke

