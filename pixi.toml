[workspace]
name = "odm"
channels = ["conda-forge"]
platforms = ["linux-64", "win-64"]

[activation.env]
LD_LIBRARY_PATH = "$PIXI_PROJECT_ROOT/SuperBuild/install/lib:$LD_LIBRARY_PATH"
DYLD_LIBRARY_PATH = "$PIXI_PROJECT_ROOT/SuperBuild/install/lib:$DYLD_LIBRARY_PATH"
PYTHONPATH = "$PIXI_PROJECT_ROOT/SuperBuild/install/lib/python3.12/dist-packages:$PIXI_PROJECT_ROOT/SuperBuild/install/lib/python3/dist-packages:$PIXI_PROJECT_ROOT/SuperBuild/install/bin/opensfm:$PYTHONPATH"

[dependencies]
beautifulsoup4 = "==4.13.4"
ceres-solver = "==2.2.0"
cgal = "5.6.*"              # OpenMVS
exifread = "==3.5.1"
fpdf2 = "==2.8.3"
gdal = "==3.11.1"
exiftool = "*"
matplotlib = "==3.10.3"
numpy = "==2.3.2"
onnxruntime = "==1.22.2"
packaging = "==25.0"
pdal = "==2.8.4"
piexif = "==1.1.3"
pillow = "==11.3.0"
py-opencv = "==4.12.0"
pygltflib = "==1.16.5"
pyproj = "==3.7.1"
python = "==3.12.9"
python-pdal = "*"
pyyaml = "==6.0.2"
scikit-image = "==0.25.2"
scikit-learn = "==1.7.1"
scipy = "==1.16.1"
shapely = "==2.1.1"
trimesh = "==4.7.1"
untwine = "*"
xmltodict = "==0.14.2"

[pypi-dependencies]
codem = "==0.26.1"
edt = "==3.0.0"
fiona = "==1.10.1"
pillow-jxl-plugin = "==1.3.4"
pyodm = "==1.5.12"
pysolar = "==0.13"
rasterio = "==1.4.3"
rawpy = "==0.25.0"
vmem = "==1.0.2"

[feature.build.activation]
env = { CMAKE_GENERATOR = "Ninja" }

[feature.build.dependencies]
c-compiler = "*"
cmake = "3.31.*"
cxx-compiler = "*"
fortran-compiler = "*"
git = "*"
ninja = "*"
pip = "*"
pkg-config = "*"
swig = "*"
tbb-devel = "2022.3.*"  # headers + TBBConfig.cmake for mvstexturing (runtime tbb is transitive)

[feature.build.target.unix.dependencies]
make = "*"
patch = "*"
rsync = "*"

[feature.build.target.win-64.dependencies]
vswhere = "*"
geotiff = "*"  # pdalcpp.dll (SuperBuild PDAL) needs geotiff.dll on PATH

[feature.gpu.target.linux-64.dependencies]
cuda-toolkit = "12.*"

[feature.gpu.target.win-64.dependencies]
cuda-toolkit = "12.*"

[environments]
default = { features = ["build"], solve-group = "default" }
prod = { features = ["build"], solve-group = "default" }
gpu = { features = ["build", "gpu"], solve-group = "default" }

# Host MSVC + Windows SDK (see conda-forge Windows native build docs); VsDevCmd via vswhere in pixi env.
[target.win-64.activation]
scripts = ["scripts/activate-msvc.bat"]

[tasks]
build = { cmd = "cmake -S SuperBuild -B SuperBuild/build && cmake --build SuperBuild/build", description = "Configure and compile SuperBuild" }
test = { cmd = "bash test.sh", description = "Run ODM test suite" }
smoke = { cmd = "bash scripts/smoke.sh", description = "Smoke test CLI and core imports" }
odm = { cmd = "bash run.sh", description = "Run ODM (pass args after --)" }
clean = { cmd = "rm -rf SuperBuild/build SuperBuild/src SuperBuild/download SuperBuild/install", description = "Remove SuperBuild build artifacts" }

[target.win-64.tasks]
build = { cmd = "cmake -S SuperBuild -B SuperBuild/build -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl && cmake --build SuperBuild/build", description = "Configure and compile SuperBuild (MSVC via activation)" }
smoke = { cmd = "scripts\\smoke.bat", description = "Smoke test CLI and core imports (native Windows)" }
odm = { cmd = "scripts\\run-odm.bat", description = "Run ODM (pass args after --)" }
clean = { cmd = "cmd /c \"rd /s /q SuperBuild\\build 2>nul & rd /s /q SuperBuild\\src 2>nul & rd /s /q SuperBuild\\download 2>nul\"", description = "Remove SuperBuild build artifacts" }
