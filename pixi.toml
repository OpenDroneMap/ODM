[workspace]
name = "odm"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "win-64", "osx-64", "osx-arm64"]

[dependencies]
python = "==3.12.9"
gdal = "==3.11.1"
py-opencv = "==4.12.0"
cgal = "5.6.*"              # OpenMVS
numpy = "==2.3.2"
scipy = "==1.16.1"
shapely = "==2.1.1"
pyproj = "==3.7.1"
pillow = "==11.3.0"
scikit-learn = "==1.7.1"
scikit-image = "==0.25.2"
pyyaml = "==6.0.2"
packaging = "==25.0"
matplotlib = "==3.10.3"
trimesh = "==4.7.1"
fpdf2 = "==2.8.3"
beautifulsoup4 = "==4.13.4"
xmltodict = "==0.14.2"
pygltflib = "==1.16.5"
piexif = "==1.1.3"
exifread = "==3.5.1"
onnxruntime = "==1.22.2"
pdal = "*"

[pypi-dependencies]
edt = "==3.0.0"
pyodm = "==1.5.12"
vmem = "==1.0.2"
pillow-jxl-plugin = "==1.3.4"
pysolar = "==0.13"
rawpy = "==0.25.0"
fiona = "==1.10.1"
rasterio = "==1.4.3"
codem = "==0.26.1"

[feature.build.dependencies]
cmake = "3.31.*"
ninja = "*"
git = "*"
pip = "*"
cxx-compiler = "*"
c-compiler = "*"
fortran-compiler = "*"
swig = "*"
pkg-config = "*"
tbb-devel = "2022.3.*"  # headers + TBBConfig.cmake for mvstexturing (runtime tbb is transitive)
geotiff = "1.7.*"       # libgeotiff-dev for SuperBuild PDAL (WITH_GEOTIFF=ON)

[feature.build.target.unix.dependencies]
make = "*"
patch = "*"
rsync = "*"

[feature.opensfm.dependencies]
ceres-solver = "==2.2.0"

[feature.gpu.target.linux-64.dependencies]
cuda-toolkit = "12.*"

[feature.gpu.target.win-64.dependencies]
cuda-toolkit = "12.*"

[environments]
default = { features = ["opensfm", "build"], solve-group = "default" }
prod = { features = ["opensfm"], solve-group = "default" }
gpu = { features = ["opensfm", "build", "gpu"], solve-group = "default" }

[tasks]
build = { cmd = "bash scripts/pixi-build.sh", description = "Configure and compile SuperBuild" }
test = { cmd = "bash test.sh", description = "Run ODM test suite" }
smoke = { cmd = "bash scripts/smoke.sh", description = "Smoke test CLI and core imports" }
odm = { cmd = "bash run.sh", description = "Run ODM (pass args after --)" }
clean = { cmd = "rm -rf SuperBuild/build SuperBuild/src SuperBuild/download SuperBuild/install", description = "Remove SuperBuild build artifacts" }
