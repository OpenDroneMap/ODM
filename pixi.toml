[workspace]
name = "odm"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "win-64", "osx-64", "osx-arm64"]

# Runtime dependencies (default + prod environments)
[dependencies]
python = "==3.12.9"

# Runtime Python bindings and native libs for SuperBuild binaries
gdal = "==3.11.1"
py-opencv = "==4.12.0"
boost-cpp = "*"   # OpenMVS links boost at runtime
cgal = "*"        # OpenMVS configure (header-only; pulls aligned Boost)
geotiff = "*"     # PDAL runtime
libjpeg-turbo = "*"  # PoissonRecon links -ljpeg
tbb = "*"         # OpenSfM / parallel runtime
ceres-solver = "==2.0.0"  # OpenSfM pybundle links libceres at runtime
gflags = "==2.2.2"        # Ceres runtime dependency

# Application Python stack (conda-forge)
numpy = "==2.3.2"
scipy = "==1.16.1"
shapely = "==2.1.1"
pyproj = "==3.7.1"
pillow = "==11.3.0"
scikit-learn = "==1.7.1"
scikit-image = "==0.25.2"
pyyaml = "==6.0.2"
packaging = "==25.0"
matplotlib = "==3.10.3"
trimesh = "==4.7.1"
fpdf2 = "==2.8.3"
beautifulsoup4 = "==4.13.4"
xmltodict = "==0.14.2"
pygltflib = "==1.16.5"
piexif = "==1.1.3"
exifread = "==3.5.1"
onnxruntime = "==1.22.2"

[pypi-dependencies]
edt = "==3.0.0"
pyodm = "==1.5.12"
vmem = "==1.0.2"
pillow-jxl-plugin = "==1.3.4"
pysolar = "==0.13"
rawpy = "==0.25.0"
fiona = "==1.10.1"
rasterio = "==1.4.3"
codem = "==0.26.1"

# SuperBuild compile toolchain and cmake find_package pins (not shipped in Docker runtime)
[feature.build.dependencies]
cmake = "3.31.*"
ninja = "*"
git = "*"
pip = "*"
cxx-compiler = "*"
c-compiler = "*"
fortran-compiler = "*"
swig = "*"
pkg-config = "*"
libgdal = "==3.11.1"
libopencv = "==4.12.0"
eigen = "3.4.*"
tbb-devel = "*"
pybind11 = "*"

[feature.build.target.unix.dependencies]
make = "*"
patch = "*"
rsync = "*"

# Optional: CUDA toolkit for GPU SIFT (PyPopsift). Off by default; use `pixi install -e gpu`.
[feature.gpu.target.linux-64.dependencies]
cuda-toolkit = "12.*"

[feature.gpu.target.win-64.dependencies]
cuda-toolkit = "12.*"

[environments]
default = { features = ["build"], solve-group = "default" }
prod = { features = [], solve-group = "default" }
gpu = { features = ["build", "gpu"], solve-group = "default" }

[tasks]
build = { cmd = "cmake -S SuperBuild -B SuperBuild/build -G Ninja -DCMAKE_PREFIX_PATH=$CONDA_PREFIX -DCMAKE_POLICY_VERSION_MINIMUM=3.5 && cmake --build SuperBuild/build", description = "Configure and compile SuperBuild (parallelism via CMAKE_BUILD_PARALLEL_LEVEL)" }
install-python = { cmd = "pip install -r requirements.txt --ignore-installed", description = "Sync pip-only packages from requirements.txt (transitional)" }
test = { cmd = "bash test.sh", description = "Run ODM test suite" }
smoke = { cmd = "bash scripts/smoke.sh", description = "Smoke test CLI and core imports" }
run = { cmd = "bash run.sh", description = "Run ODM (pass args after --)" }
clean = { cmd = "rm -rf SuperBuild/build SuperBuild/src SuperBuild/download", description = "Remove SuperBuild build artifacts" }
