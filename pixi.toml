[workspace]
name = "odm"
channels = ["conda-forge"]
platforms = ["linux-64", "win-64", "osx-arm64", "linux-aarch64"]

[target.linux.activation.env]
LD_LIBRARY_PATH = "$PIXI_PROJECT_ROOT/SuperBuild/install/lib:$LD_LIBRARY_PATH"

[target.osx.activation.env]
DYLD_LIBRARY_PATH = "$PIXI_PROJECT_ROOT/SuperBuild/install/lib:$DYLD_LIBRARY_PATH"

[dependencies]
beautifulsoup4 = "==4.13.4"
ceres-solver = "==2.2.0"
cgal = "5.6.*"              # OpenMVS
exifread = "==3.5.1"
exiftool = "*"
fpdf2 = "==2.8.3"
gdal = "==3.11.1"
matplotlib = "==3.10.3"    # undeclared runtime import of codem (pypi)
numpy = "==2.3.2"
onnxruntime = { version = "==1.22.2", build = "*cpu*" }
pdal = "==2.8.4"
piexif = "==1.1.3"
pillow = "==11.3.0"
py-opencv = "==4.12.0"
pygltflib = "==1.16.5"
pyproj = "==3.7.1"
python = "==3.12.9"
python-pdal = "*"
pyyaml = "==6.0.2"
scikit-image = "==0.25.2"
scikit-learn = "==1.7.1"
scipy = "==1.16.1"
shapely = "==2.1.1"
trimesh = "==4.7.1"        # undeclared runtime import of codem (pypi)
untwine = "*"
xmltodict = "==0.14.2"

[pypi-dependencies]
codem = "==0.26.1"
edt = "==3.0.0"
fiona = "==1.10.1"
pillow-jxl-plugin = "==1.3.4"
pyodm = "==1.5.12"
pysolar = "==0.13"
rasterio = "==1.4.3"
rawpy = "==0.25.0"
vmem = "==1.0.2"

# Runtime dependency, not build-only: pdalcpp.dll (SuperBuild PDAL) needs
# geotiff.dll on PATH, so it must be present in the prod (runtime) env too.
[target.win-64.dependencies]
geotiff = "*"

[feature.build.activation]
env = { CMAKE_GENERATOR = "Ninja" }

[feature.build.dependencies]
c-compiler = "*"
cmake = "3.31.*"
cxx-compiler = "*"
git = "*"
ninja = "*"
pybind11 = "*"
pkg-config = "*"
tbb-devel = "2022.3.*"  # headers + TBBConfig.cmake for mvstexturing (runtime tbb is transitive)

[feature.build.target.unix.dependencies]
make = "*"
patch = "*"

[feature.build.target.win-64.dependencies]
vswhere = "*"
vs2022_win-64 = "*"

[feature.gpu]
# Not supported on macs as they don't have CUDA drivers and we don't support MPS yet.
platforms = ["linux-64", "win-64", "linux-aarch64"]

[feature.gpu.system-requirements]
cuda = "12.0"

[feature.gpu.dependencies]
cuda-toolkit = "12.*"

[environments]
default = { features = ["build"], solve-group = "default" }
prod = { solve-group = "default" }  # runtime only: no compilers/cmake/etc.
gpu = { features = ["build", "gpu"] }

[target.win-64.activation]
scripts = ["scripts/activate-msvc.bat"]
env = { PYTHONUTF8 = "1" }

[tasks]
build = { cmd = "cmake -S SuperBuild -B SuperBuild/build && cmake --build SuperBuild/build", description = "Configure and compile SuperBuild" }
test = { cmd = "python scripts/test.py", description = "Run ODM test suite (pass a test name after --)" }
smoke = { cmd = "python scripts/smoke.py", description = "Smoke test CLI and core imports" }
odm = { cmd = "python run.py", description = "Run ODM (pass args after --)" }
clean = { cmd = "rm -rf SuperBuild/build SuperBuild/src SuperBuild/download SuperBuild/install", description = "Remove SuperBuild build artifacts" }

[target.win-64.tasks]
build = { cmd = "cmake -S SuperBuild -B SuperBuild/build -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl -DCMAKE_BUILD_TYPE=Release && cmake --build SuperBuild/build", description = "Configure and compile SuperBuild (MSVC via activation)" }
clean = { cmd = "cmd /c \"rd /s /q SuperBuild\\build 2>nul & rd /s /q SuperBuild\\src 2>nul & rd /s /q SuperBuild\\download 2>nul\"", description = "Remove SuperBuild build artifacts" }
